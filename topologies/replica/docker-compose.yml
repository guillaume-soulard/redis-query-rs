services:
  redis-replica-master:
    image: redis:latest
    container_name: redis-replica-master
    ports:
      - "6381:6379"
    restart: always

  redis-replica-node:
    image: redis:latest
    container_name: redis-replica-node
    command: redis-server --replicaof redis-replica-master 6379
    depends_on:
      - redis-replica-master
    ports:
      - "6382:6379"
    restart: always
